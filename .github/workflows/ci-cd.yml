name: Dot Camp – CI/CD → Hugging Face Spaces

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

# ── Jobs ──────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. Deploy to Hugging Face Space ─────────────────────────────────────────
  deploy:
    name: Deploy → huggingface.co/spaces/adamnouassida5/dot_camp
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://huggingface.co/spaces/adamnouassida5/dot_camp

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.email "ci-bot@github-actions"
          git config user.name  "GitHub Actions"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf "https://adamnouassida5:${HF_TOKEN}@huggingface.co/spaces/adamnouassida5/dot_camp"
          git push hf main --force
          echo "✅ Deployed to https://huggingface.co/spaces/adamnouassida5/dot_camp"

      - name: Wait for Space to wake up
        run: |
          echo "Waiting for Space to rebuild…"
          sleep 30
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://adamnouassida5-dot-camp.hf.space/" || true)
            echo "Attempt $i – HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "✅ Space is live!"
              exit 0
            fi
            sleep 20
          done
          echo "⚠️  Space is still building — check https://huggingface.co/spaces/adamnouassida5/dot_camp"
          exit 0